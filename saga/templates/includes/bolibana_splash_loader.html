<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoliBana Sugu — Splash</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #008000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  .splash {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== PANIER ===== */
  #logo-svg {
    width: 150px;
    height: 150px;
    margin-bottom: 24px;
    overflow: visible;
  }

  /* Anse */
  #handle {
    stroke-dasharray: 130;
    stroke-dashoffset: 130;
    animation: draw 0.6s cubic-bezier(0.4,0,0.2,1) 0.1s forwards;
  }
  /* Corps panier — longueur exacte du path mesurée */
  #basket {
    stroke-dasharray: 280;
    stroke-dashoffset: 280;
    animation: draw 0.75s cubic-bezier(0.4,0,0.2,1) 0.55s forwards;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* Pastilles pop */
  #dot-green { transform-origin: 42px 74px; transform: scale(0); animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1) 1.15s forwards; }
  #dot-gold  { transform-origin: 64px 74px; transform: scale(0); animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1) 1.32s forwards; }
  #dot-red   { transform-origin: 86px 74px; transform: scale(0); animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1) 1.50s forwards; }
  @keyframes pop { to { transform: scale(1); } }

  /* Badge */
  #badge { transform-origin: 104px 34px; transform: scale(0); animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.72s forwards; }

  /* Roues */
  .wheel { opacity: 0; animation: fadein 0.25s ease 1.95s forwards; }
  @keyframes fadein { to { opacity: 1; } }

  /* ===== TEXTE ===== */
  .wordmark { display: flex; align-items: baseline; }

  .word-boli {
    color: white;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -2px;
    opacity: 0;
    transform: translateY(18px);
    animation: slideup 0.5s cubic-bezier(0.34,1.2,0.64,1) 2.05s forwards;
  }
  .word-bana {
    color: #FFD700;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -2px;
    opacity: 0;
    transform: translateY(18px);
    animation: slideup 0.5s cubic-bezier(0.34,1.2,0.64,1) 2.2s forwards;
  }
  @keyframes slideup { to { opacity: 1; transform: translateY(0); } }

  .sugu {
    color: #C0392B;
    font-family: sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 8px;
    text-indent: 8px;
    margin-top: 7px;
    opacity: 0;
    animation: fadein 0.4s ease 2.6s forwards;
  }

  /* Barre tricolore */
  .tribar {
    display: flex;
    gap: 5px;
    margin-top: 12px;
    opacity: 0;
    animation: fadein 0.01s ease 2.78s forwards;
  }
  .tribar span {
    height: 3.5px;
    border-radius: 2px;
    width: 44px;
    transform: scaleX(0);
    transform-origin: left;
  }
  .t-green { background: rgba(255,255,255,0.75); animation: barshrink 0.3s ease 2.8s  forwards; }
  .t-gold  { background: #FFD700;                animation: barshrink 0.3s ease 2.95s forwards; }
  .t-red   { background: #C0392B;                animation: barshrink 0.3s ease 3.1s  forwards; }
  @keyframes barshrink { to { transform: scaleX(1); } }

  /* Tagline */
  .tagline {
    color: rgba(255,255,255,0.4);
    font-family: sans-serif;
    font-size: 11px;
    letter-spacing: 0.4px;
    margin-top: 14px;
    opacity: 0;
    animation: fadein 0.5s ease 3.3s forwards;
  }

  /* Loader dots */
  .loader { display: flex; gap: 7px; margin-top: 44px; opacity: 0; animation: fadein 0.3s ease 3.5s forwards; }
  .ld {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .ld:nth-child(1) { animation: pulse 1.2s ease 3.6s infinite; }
  .ld:nth-child(2) { animation: pulse 1.2s ease 3.8s infinite; }
  .ld:nth-child(3) { animation: pulse 1.2s ease 4.0s infinite; }
  @keyframes pulse {
    0%,100% { background: rgba(255,255,255,0.25); transform: scale(1); }
    50%      { background: #FFD700; transform: scale(1.45); }
  }

  /* Fond respiration */
  .bg-breathe {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 44%, rgba(255,255,255,0.07) 0%, transparent 65%);
    animation: breathe 3s ease-in-out 2.5s infinite alternate;
  }
  @keyframes breathe {
    from { transform: scale(1); opacity: 0.6; }
    to   { transform: scale(1.1); opacity: 1; }
  }

  /* Replay -->
  .replay {
    position: fixed; bottom: 20px; right: 20px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.45);
    font-family: sans-serif; font-size: 11px;
    padding: 6px 14px; border-radius: 20px;
    cursor: pointer; opacity: 0;
    animation: fadein 0.4s ease 4.2s forwards;
    transition: background 0.2s, color 0.2s;
  }
  .replay:hover { background: rgba(255,255,255,0.2); color: white; }
</style>
</head>
<body>

<div class="bg-breathe"></div>

<div class="splash">

  <!-- PANIER SVG — viewBox 114×110, panier centré propre -->
  <svg id="logo-svg" viewBox="0 0 128 120" xmlns="http://www.w3.org/2000/svg">

    <!-- ANSE : arc propre de x=28 à x=100, sommet y=14 -->
    <path id="handle"
      d="M28 52 Q28 14 64 14 Q100 14 100 52"
      fill="none"
      stroke="rgba(255,255,255,0.92)"
      stroke-width="5.5"
      stroke-linecap="round"/>

    <!-- CORPS PANIER :
         Trapèze fermé correctement.
         Haut : x=16 à x=112, y=52
         Bas  : x=26 à x=102, y=96
         Côtés biseautés.
         Chemin fermé avec Z pour que le trait soit continu.
    -->
    <path id="basket"
      d="M16 52 L26 96 Q26 102 34 102 L94 102 Q102 102 102 96 L112 52 Z"
      fill="none"
      stroke="rgba(255,255,255,0.92)"
      stroke-width="5.5"
      stroke-linejoin="round"
      stroke-linecap="round"/>

    <!-- 3 pastilles drapeau Mali, centrées dans le panier -->
    <circle id="dot-green" cx="42"  cy="74" r="12" fill="#009A00"/>
    <circle id="dot-gold"  cx="64"  cy="74" r="12" fill="#FFD700" stroke="#D4A017" stroke-width="1.2"/>
    <circle id="dot-red"   cx="86"  cy="74" r="12" fill="#C0392B"/>

    <!-- Badge notification rouge en haut à droite de l'anse -->
    <g id="badge">
      <circle cx="106" cy="34" r="14" fill="#C0392B"/>
      <text x="106" y="39.5" font-size="14" font-weight="700" fill="white"
        font-family="sans-serif" text-anchor="middle">3</text>
    </g>

    <!-- Roues -->
    <g class="wheel">
      <circle cx="34"  cy="111" r="7" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
      <circle cx="34"  cy="111" r="2.2" fill="rgba(255,255,255,0.6)"/>
      <circle cx="94"  cy="111" r="7" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
      <circle cx="94"  cy="111" r="2.2" fill="rgba(255,255,255,0.6)"/>
    </g>

  </svg>

  <!-- NOM -->
  <div class="wordmark">
    <span class="word-boli">Boli</span>
    <span class="word-bana">Bana</span>
  </div>

  <div class="sugu">SUGU</div>

  <div class="tribar">
    <span class="t-green"></span>
    <span class="t-gold"></span>
    <span class="t-red"></span>
  </div>

  <div class="tagline">Votre intermédiaire expert du marché</div>

  <div class="loader">
    <div class="ld"></div>
    <div class="ld"></div>
    <div class="ld"></div>
  </div>

</div>

<button class="replay" onclick="location.reload()">↺ Rejouer</button>

</body>
</html>
